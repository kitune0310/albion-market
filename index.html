<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Albion Market Pro Analyzer</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#ffd700;
}

input,select,button{
padding:10px;
font-size:16px;
margin:6px;
border-radius:6px;
border:none;
}

button{
background:#ffd700;
color:black;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffe866;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
width:95%;
max-width:1100px;
}

td,th{
border:1px solid #444;
padding:10px;
}

th{
background:#1a1a1a;
}

tr:nth-child(even){
background:#151515;
}

.profit{
color:#00ff7f;
font-weight:bold;
}

.good{
color:#00eaff;
}

.loading{
color:#00ffff;
font-size:18px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Albion Market PRO Analyzer</h1>

<select id="server">
<option value="west">America Server</option>
<option value="europe">Europe Server</option>
<option value="east">Asia Server</option>
</select>

<br>

<input id="search" placeholder="Search item (Japanese)">
<br>

<select id="items"></select>

<br>

<input id="weight" placeholder="Item Weight (kg)" type="number">

<br>

<button onclick="loadPrices()">Analyze Market</button>

<div id="result"></div>

<table id="priceTable">
<tr>
<th>City</th>
<th>Sell Min</th>
<th>Buy Max</th>
</tr>
</table>

<table id="tradeTable">
<tr>
<th>Buy City</th>
<th>Sell City</th>
<th>Profit</th>
<th>Profit/kg</th>
</tr>
</table>

<script>

let itemList=[];

async function loadItems(){

let res=await fetch("https://raw.githubusercontent.com/ao-data/ao-bin-dumps/master/formatted/items.json");

itemList=await res.json();

}

document.getElementById("search").addEventListener("input",searchItem);

function searchItem(){

let text=document.getElementById("search").value.toLowerCase();

let select=document.getElementById("items");

select.innerHTML="";

itemList.forEach(item=>{

if(item.LocalizedNames && item.LocalizedNames["JA-JP"]){

let name=item.LocalizedNames["JA-JP"].toLowerCase();

if(name.includes(text)){

let option=document.createElement("option");

option.value=item.UniqueName;
option.text=item.LocalizedNames["JA-JP"];

select.appendChild(option);

}

}

});

}

async function loadPrices(){

let item=document.getElementById("items").value;

if(!item){
alert("Select item first");
return;
}

let weight=parseFloat(document.getElementById("weight").value) || 1;

let server=document.getElementById("server").value;

document.getElementById("result").innerHTML='<div class="loading">Loading market data...</div>';

let url="https://"+server+".albion-online-data.com/api/v2/stats/prices/"+item+".json";

let res=await fetch(url);

let data=await res.json();

let cities={};

data.forEach(d=>{

if(!cities[d.city]){
cities[d.city]={sell:999999999,buy:0};
}

if(d.sell_price_min>0 && d.sell_price_min<cities[d.city].sell){
cities[d.city].sell=d.sell_price_min;
}

if(d.buy_price_max>cities[d.city].buy){
cities[d.city].buy=d.buy_price_max;
}

});

let priceTable=document.getElementById("priceTable");

priceTable.innerHTML="<tr><th>City</th><th>Sell Min</th><th>Buy Max</th></tr>";

for(let city in cities){

priceTable.innerHTML+=`
<tr>
<td>${city}</td>
<td>${cities[city].sell}</td>
<td>${cities[city].buy}</td>
</tr>
`;

}

let trades=[];

for(let buyCity in cities){

for(let sellCity in cities){

if(buyCity!==sellCity){

let buy=cities[buyCity].sell;
let sell=cities[sellCity].buy;

let profit=Math.floor(sell*0.96-buy);

if(profit>0){

trades.push({
buyCity:buyCity,
sellCity:sellCity,
profit:profit,
ppkg:(profit/weight).toFixed(2)
});

}

}

}

}

trades.sort((a,b)=>b.profit-a.profit);

let tradeTable=document.getElementById("tradeTable");

tradeTable.innerHTML="<tr><th>Buy City</th><th>Sell City</th><th>Profit</th><th>Profit/kg</th></tr>";

trades.slice(0,20).forEach(t=>{

tradeTable.innerHTML+=`
<tr>
<td>${t.buyCity}</td>
<td>${t.sellCity}</td>
<td class="profit">+${t.profit}</td>
<td class="good">${t.ppkg}</td>
</tr>
`;

});

document.getElementById("result").innerHTML="Analysis Complete";

}

loadItems();

</script>

</body>
</html>
