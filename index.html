<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>Albion Market Analyzer PRO</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Albion Online Market Analyzer PRO</h1>

<select id="server">

<option value="east">Asia</option>
<option value="west">America</option>
<option value="europe">Europe</option>

</select>

<br>

<input id="search" placeholder="アイテム名検索">

<br>

<select id="items"></select>

<br>

<img id="itemIcon">

<br>

<input id="weight" placeholder="重量 kg" type="number">

<input id="minProfit" placeholder="最低利益">

<br>

<button onclick="loadPrices()">市場分析</button>

<button onclick="scanBest()">🔥 最強アイテム検索</button>

<div id="result"></div>

<h2 id="bestTrade"></h2>

<h2>💰 BEST ITEM</h2>

<table id="bestItems">

<tr>
<th>アイテム</th>
<th>利益</th>
<th>利益/kg</th>
</tr>

</table>

<table id="priceTable">

<tr>
<th>都市</th>
<th>最安購入</th>
<th>最高売却</th>
</tr>

</table>

<table id="tradeTable">

<tr>
<th>購入都市</th>
<th>販売都市</th>
<th>利益</th>
<th>利益/kg</th>
<th>利益率</th>
</tr>

</table>

<canvas id="priceChart"></canvas>

<script src="script.js"></script>

</body>
</html>
