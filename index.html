<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Albion Market Analyzer AI ULTIMATE+</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:
    linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.95)),
    url("https://images.albiononline.com/uploads/media/default/media/5e6e34c5d64e7.jpg");
    background-size:cover;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{color:#ffd700}

input,select,button{
    padding:10px;
    margin:5px;
    border-radius:6px;
    border:none;
}

button{
    background:#ffd700;
    cursor:pointer;
}

table{
    margin:auto;
    margin-top:20px;
    border-collapse:collapse;
    width:95%;
    background:rgba(0,0,0,0.7);
}

th,td{
    border:1px solid #444;
    padding:8px;
}

canvas{
    max-width:900px;
    margin-top:40px;
    width:100%;
}

.bm{
    background:rgba(255,0,0,0.3);
    color:#ffd700;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>⚔ Albion Market Analyzer AI ULTIMATE+</h1>

<!-- サーバー -->
<select id="server">
<option value="east">Asia</option>
<option value="west">America</option>
<option value="europe">Europe</option>
</select>

<!-- Tier -->
<select id="tier">
<option value="">全Tier</option>
<option value="T4">T4</option>
<option value="T5">T5</option>
<option value="T6">T6</option>
<option value="T7">T7</option>
<option value="T8">T8</option>
</select>

<input id="search" placeholder="アイテム検索">
<br>

<select id="items"></select>
<br>

<img id="itemIcon" width="80">

<br>

<!-- 🔥 追加：税率 -->
<input id="tax" type="number" value="6.5" step="0.1"> % 税率

<br>

<!-- 🔥 追加：重量 -->
<input id="weight" placeholder="重量" type="number">
<input id="cargo" placeholder="運搬量" type="number">

<br>

<!-- 🔥 追加：都市フィルター -->
<h3>都市選択</h3>
<div id="cityFilter"></div>

<button onclick="loadPrices()">市場分析</button>

<h2 id="bestTrade"></h2>
<h3 id="aiAdvice"></h3>
<div id="result"></div>

<h2>都市価格</h2>
<table id="priceTable"></table>

<h2>トレード</h2>
<table id="tradeTable"></table>

<h2>📊 現在価格</h2>
<canvas id="priceChart"></canvas>

<script>

let itemList = [];
let priceChart = null;

const allCities=["Bridgewatch","Martlock","Lymhurst","Fort Sterling","Thetford","Caerleon","Black Market"];

// =========================
// 都市チェック生成
// =========================
function createCityFilter(){
    let div = document.getElementById("cityFilter");
    allCities.forEach(c=>{
        div.innerHTML += `<label><input type="checkbox" value="${c}" checked> ${c}</label>`;
    });
}
createCityFilter();

// =========================
// アイテム
// =========================
async function loadItems(){
    let res = await fetch("https://raw.githubusercontent.com/ao-data/ao-bin-dumps/master/formatted/items.json");
    itemList = await res.json();
}
loadItems();

document.getElementById("search").addEventListener("input", searchItem);

function searchItem(){
    let text = document.getElementById("search").value.toLowerCase();
    let tier = document.getElementById("tier").value;
    let select = document.getElementById("items");

    select.innerHTML = "";

    itemList.forEach(item=>{
        if(!item.LocalizedNames) return;
        let name = item.LocalizedNames["JA-JP"]||"";

        if(tier && !item.UniqueName.startsWith(tier)) return;

        if(name.toLowerCase().includes(text)){
            let op = document.createElement("option");
            op.value = item.UniqueName;
            op.text = name;
            select.appendChild(op);
        }
    });
}

// =========================
// メイン
// =========================
async function loadPrices(){

    let item = document.getElementById("items").value;
    if(!item) return;

    document.getElementById("result").innerHTML = "AI分析中...";

    document.getElementById("itemIcon").src =
    "https://render.albiononline.com/v1/item/"+item+".png";

    let weight = parseFloat(document.getElementById("weight").value||1);
    let cargo = parseFloat(document.getElementById("cargo").value||800);
    let tax = parseFloat(document.getElementById("tax").value||6.5)/100;

    // 🔥 選択都市
    let cities = [...document.querySelectorAll("#cityFilter input:checked")]
    .map(c=>c.value);

    let server = document.getElementById("server").value;

    let url = `https://${server}.albion-online-data.com/api/v2/stats/prices/${item}?locations=${cities.join(",")}`;

    let res = await fetch(url);
    let data = await res.json();

    let market = {};
    cities.forEach(c=>market[c]={sell:999999999,buy:0});

    data.forEach(d=>{
        if(d.sell_price_min>0 && d.sell_price_min<market[d.city].sell){
            market[d.city].sell = d.sell_price_min;
        }
        if(d.buy_price_max>market[d.city].buy){
            market[d.city].buy = d.buy_price_max;
        }
    });

    drawChart(market);
    drawTable(market);
    calculateTrades(market, weight, cargo, tax);

    document.getElementById("result").innerHTML = "AI分析完了";
}

// =========================
// チャート
// =========================
function drawChart(market){
    let labels=[],buy=[],sell=[],profit=[];

    for(let c in market){
        labels.push(c);
        let b = market[c].sell;
        let s = market[c].buy;

        buy.push(b===999999999 ? null : b);
        sell.push(s===0 ? null : s);
        profit.push((b===999999999 || s===0) ? null : s-b);
    }

    let ctx = document.getElementById("priceChart");

    if(priceChart) priceChart.destroy();

    priceChart = new Chart(ctx,{
        data:{
            labels: labels,
            datasets:[
                {type:"bar", label:"最安購入", data:buy, backgroundColor:"cyan"},
                {type:"line", label:"最高売却", data:sell, borderColor:"orange"},
                {type:"line", label:"利益", data:profit, borderColor:"lime"}
            ]
        }
    });
}

// =========================
// テーブル
// =========================
function drawTable(market){
    let t = document.getElementById("priceTable");
    t.innerHTML = "<tr><th>都市</th><th>買</th><th>売</th></tr>";

    for(let c in market){
        let sellDisplay = market[c].sell === 999999999 ? "-" : market[c].sell;
        let buyDisplay  = market[c].buy === 0 ? "-" : market[c].buy;

        let cls = c==="Black Market" ? "class='bm'" : "";

        t.innerHTML += `<tr ${cls}><td>${c}</td><td>${sellDisplay}</td><td>${buyDisplay}</td></tr>`;
    }
}

// =========================
// トレード
// =========================
function calculateTrades(market, weight, cargo, tax){
    let trades = [];

    for(let b in market){
        for(let s in market){
            if(b===s) continue;

            let buy = market[b].sell;
            let sell = market[s].buy;

            if(buy==999999999 || sell==0) continue;

            let profit = Math.floor(sell*(1-tax) - buy);
            let cargoProfit = Math.floor((cargo/weight)*profit);
            let roi = ((profit/buy)*100).toFixed(1);

            trades.push({b,s,profit,cargoProfit,roi});
        }
    }

    trades.sort((a,b)=>b.cargoProfit - a.cargoProfit);

    let table = document.getElementById("tradeTable");
    table.innerHTML="<tr><th>購入</th><th>販売</th><th>利益</th><th>総利益</th><th>ROI</th></tr>";

    trades.slice(0,20).forEach(t=>{
        let cls = t.s==="Black Market" ? "class='bm'" : "";

        table.innerHTML += `
        <tr ${cls}>
            <td>${t.b}</td>
            <td>${t.s}</td>
            <td>${t.profit}</td>
            <td style="color:gold">${t.cargoProfit}</td>
            <td>${t.roi}%</td>
        </tr>`;
    });

    if(trades.length){
        let best = trades[0];
        document.getElementById("bestTrade").innerHTML =
        `🔥 BEST: ${best.b} → ${best.s} / 利益 ${best.cargoProfit}`;
    }
}

</script>

</body>
</html>
