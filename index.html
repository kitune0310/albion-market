<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>Albion Market Analyzer AI PRO+</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>⚔ Albion Market Analyzer AI PRO+</h1>

<div class="panel">

<select id="server">
<option value="east">Asia</option>
<option value="west">America</option>
<option value="europe">Europe</option>
</select>

<select id="tier">
<option value="">All Tier</option>
<option value="T4">T4</option>
<option value="T5">T5</option>
<option value="T6">T6</option>
<option value="T7">T7</option>
<option value="T8">T8</option>
</select>

</div>

<input id="search" placeholder="アイテム検索">

<br>
<select id="items"></select>
<br>
<img id="itemIcon">
<br>
<input id="weight" placeholder="重量 kg" type="number">
<input id="cargo" placeholder="運搬量 kg" type="number">
<input id="minProfit" placeholder="最低利益">

<br>
<button onclick="loadPrices()">市場分析</button>
<button onclick="scanBlackMarket()">🏴 Black Market Scan</button>
<button onclick="scanAllTrades()">🌍 全アイテムAIルート</button>

<div id="result"></div>

<h2 id="bestTrade"></h2>

<h2>💰 BLACK MARKET BEST</h2>
<table id="bestItems">
<tr><th>アイテム</th><th>利益</th><th>利益/kg</th></tr>
</table>

<h2>🚚 AI 推奨 CARGO TRADES</h2>
<table id="cargoTrades">
<tr><th>アイテム</th><th>購入都市</th><th>販売都市</th><th>総利益</th><th>推奨マウント</th><th>危険ゾーン</th></tr>
</table>

<h2>都市価格</h2>
<table id="priceTable">
<tr><th>都市</th><th>最安購入</th><th>最高売却</th></tr>
</table>

<h2>トレード</h2>
<table id="tradeTable">
<tr><th>購入都市</th><th>販売都市</th><th>利益</th><th>利益/kg</th><th>総利益</th><th>ROI</th></tr>
</table>

<canvas id="priceChart"></canvas>

<script src="script.js"></script>
</body>
</html>
