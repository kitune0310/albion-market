<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>アルビオン市場ツール</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:sans-serif;
text-align:center;
}

h1{
color:#ffd700;
}

input,select{
padding:10px;
font-size:16px;
margin:5px;
}

button{
padding:10px;
font-size:16px;
cursor:pointer;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:10px;
}

#result{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<h1>アルビオン市場分析ツール</h1>

<select id="server">
<option value="west">アメリカサーバー</option>
<option value="europe">ヨーロッパサーバー</option>
<option value="east">アジアサーバー</option>
</select>

<br>

<input id="search" placeholder="日本語でアイテム検索">

<button onclick="searchItem()">検索</button>

<br><br>

<select id="items"></select>

<button onclick="loadPrices()">価格取得</button>

<div id="result"></div>

<table id="table">
<tr>
<th>都市</th>
<th>最安購入</th>
<th>最高販売</th>
</tr>
</table>

<script>

let itemList=[];

async function loadItems(){

let res=await fetch("https://raw.githubusercontent.com/ao-data/ao-bin-dumps/master/formatted/items.json");

itemList=await res.json();

}

async function searchItem(){

let text=document.getElementById("search").value.toLowerCase();

let select=document.getElementById("items");

select.innerHTML="";

itemList.forEach(item=>{

if(item.LocalizedNames && item.LocalizedNames["JA-JP"]){

let name=item.LocalizedNames["JA-JP"].toLowerCase();

if(name.includes(text)){

let option=document.createElement("option");

option.value=item.UniqueName;

option.text=item.LocalizedNames["JA-JP"];

select.appendChild(option);

}

}

});

}

async function loadPrices(){

let item=document.getElementById("items").value;

let server=document.getElementById("server").value;

let url="https://"+server+".albion-online-data.com/api/v2/stats/prices/"+item+".json";

let res=await fetch(url);

let data=await res.json();

let cities={};

data.forEach(d=>{

if(!cities[d.city]){
cities[d.city]={sell:999999999,buy:0};
}

if(d.sell_price_min>0 && d.sell_price_min<cities[d.city].sell){
cities[d.city].sell=d.sell_price_min;
}

if(d.buy_price_max>cities[d.city].buy){
cities[d.city].buy=d.buy_price_max;
}

});

let table=document.getElementById("table");

table.innerHTML="<tr><th>都市</th><th>最安購入</th><th>最高販売</th></tr>";

let cheapestCity="";
let cheapest=999999999;

let bestCity="";
let best=0;

for(let city in cities){

let sell=cities[city].sell;
let buy=cities[city].buy;

table.innerHTML+=`
<tr>
<td>${city}</td>
<td>${sell}</td>
<td>${buy}</td>
</tr>
`;

if(sell<cheapest){
cheapest=sell;
cheapestCity=city;
}

if(buy>best){
best=buy;
bestCity=city;
}

}

let profit=best-cheapest;

document.getElementById("result").innerHTML=
"最安購入都市: "+cheapestCity+" "+cheapest+
"<br>最高売却都市: "+bestCity+" "+best+
"<br>輸送利益: "+profit+" シルバー";

}

loadItems();

</script>

</body>
</html>
