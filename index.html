<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>アルビオン市場分析ツール</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:sans-serif;
text-align:center;
}

h1{color:#ffd700;}

input,select{
padding:10px;
font-size:16px;
margin:5px;
}

button{
padding:10px;
font-size:16px;
cursor:pointer;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:10px;
}
</style>
</head>

<body>

<h1>アルビオン市場分析ツール</h1>

<select id="server">
<option value="west">アメリカ</option>
<option value="europe">ヨーロッパ</option>
<option value="east">アジア</option>
</select>

<input id="item" placeholder="バッグ など">

<button onclick="loadPrices()">検索</button>

<table id="table">
<tr>
<th>都市</th>
<th>最安売り</th>
<th>最高買い</th>
</tr>
</table>

<script>

const itemMap={
"バッグ":"T4_BAG",
"板":"T4_PLANKS",
"鉄鉱石":"T4_ORE",
"布":"T4_CLOTH",
"革":"T4_LEATHER"
};

async function loadPrices(){

let item=document.getElementById("item").value;

if(itemMap[item]){
item=itemMap[item];
}

let server=document.getElementById("server").value;

let url="https://"+server+".albion-online-data.com/api/v2/stats/prices/"+item+".json";

let res=await fetch(url);
let data=await res.json();

let cities={};

data.forEach(d=>{

if(!cities[d.city]){
cities[d.city]={sell:999999999,buy:0};
}

if(d.sell_price_min>0 && d.sell_price_min<cities[d.city].sell){
cities[d.city].sell=d.sell_price_min;
}

if(d.buy_price_max>cities[d.city].buy){
cities[d.city].buy=d.buy_price_max;
}

});

let table=document.getElementById("table");

table.innerHTML="<tr><th>都市</th><th>最安売り</th><th>最高買い</th></tr>";

for(let city in cities){

table.innerHTML+=`
<tr>
<td>${city}</td>
<td>${cities[city].sell}</td>
<td>${cities[city].buy}</td>
</tr>
`;

}

}

</script>

</body>
</html>
