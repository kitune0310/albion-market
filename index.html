<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Albion Market AI PRO TRADER</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:linear-gradient(rgba(0,0,0,0.9),rgba(0,0,0,0.95));
    color:white;
    font-family:Arial;
    text-align:center;
}
h1{color:#ffd700}
input,select,button{padding:8px;margin:5px;border-radius:6px;border:none;}
button{background:#ffd700;cursor:pointer;}
canvas{max-width:1000px;margin-top:30px;}
.bm{background:rgba(255,0,0,0.3);}
</style>
</head>

<body>

<h1>⚔ Albion Market AI PRO TRADER</h1>

<select id="server">
<option value="east">Asia</option>
<option value="west">America</option>
<option value="europe">Europe</option>
</select>

<input id="search" placeholder="アイテム検索">
<select id="items"></select><br>

<input id="tax" type="number" value="6.5">税%
<input id="weight" placeholder="重量">
<input id="cargo" placeholder="運搬量"><br>

<div id="cityFilter"></div>

<button onclick="loadPrices()">分析</button>

<h2 id="aiAdvice"></h2>

<canvas id="priceChart"></canvas>
<canvas id="historyChart"></canvas>

<script>

let itemList=[];
let historyChart=null;
let priceChart=null;

const cities=["Bridgewatch","Martlock","Lymhurst","Fort Sterling","Thetford","Caerleon","Black Market"];

// 都市チェック
cities.forEach(c=>{
 document.getElementById("cityFilter").innerHTML+=
 `<label><input type="checkbox" value="${c}" checked>${c}</label>`;
});

// アイテム
fetch("https://raw.githubusercontent.com/ao-data/ao-bin-dumps/master/formatted/items.json")
.then(r=>r.json()).then(d=>itemList=d);

document.getElementById("search").addEventListener("input",()=>{
 let s=document.getElementById("search").value.toLowerCase();
 let sel=document.getElementById("items");
 sel.innerHTML="";
 itemList.forEach(i=>{
  if(!i.LocalizedNames) return;
  let n=i.LocalizedNames["JA-JP"]||"";
  if(n.toLowerCase().includes(s)){
   let op=document.createElement("option");
   op.value=i.UniqueName;
   op.text=n;
   sel.appendChild(op);
  }
 });
});

// メイン
async function loadPrices(){

let item=document.getElementById("items").value;
let server=document.getElementById("server").value;
let tax=document.getElementById("tax").value/100;

let selected=[...document.querySelectorAll("#cityFilter input:checked")].map(c=>c.value);

// 現在価格
let res=await fetch(`https://${server}.albion-online-data.com/api/v2/stats/prices/${item}?locations=${selected}`);
let data=await res.json();

let market={};
selected.forEach(c=>market[c]={sell:999999999,buy:0});

data.forEach(d=>{
 if(d.sell_price_min>0 && d.sell_price_min<market[d.city].sell) market[d.city].sell=d.sell_price_min;
 if(d.buy_price_max>market[d.city].buy) market[d.city].buy=d.buy_price_max;
});

// チャート
drawPriceChart(market);

// 履歴
await loadHistory(item,server,selected);

}

// =========================
// 現在価格
// =========================
function drawPriceChart(market){
let labels=[],profit=[];

for(let c in market){
 let b=market[c].sell;
 let s=market[c].buy;
 labels.push(c);
 profit.push((b==999999999||s==0)?null:s-b);
}

if(priceChart) priceChart.destroy();

priceChart=new Chart(document.getElementById("priceChart"),{
 type:"bar",
 data:{labels,datasets:[{label:"利益差",data:profit,backgroundColor:"lime"}]}
});
}

// =========================
// 履歴（プロ版）
// =========================
async function loadHistory(item,server,selected){

let res=await fetch(`https://${server}.albion-online-data.com/api/v2/stats/history/${item}?locations=${selected}&time-scale=1`);
let data=await res.json();

let datasets=[];
let labels=[];
let volume=[];

// 都市ごと
data.forEach(city=>{
 if(!city.data) return;

 let prices=[];
 city.data.forEach((d,i)=>{
  if(i==0) labels.push(new Date(d.timestamp).toLocaleString());
  prices.push(d.avg_price);
  volume.push(d.item_count);
 });

 datasets.push({
  label:city.location,
  data:prices,
  borderWidth:2,
  tension:0.2
 });
});

// =========================
// MA
// =========================
function MA(arr,p){
 let r=[];
 for(let i=0;i<arr.length;i++){
  if(i<p) r.push(null);
  else{
   let sum=0;
   for(let j=i-p;j<i;j++) sum+=arr[j];
   r.push(sum/p);
  }
 }
 return r;
}

// 平均ベース
let base=data[0]?.data?.map(d=>d.avg_price)||[];

let ma7=MA(base,7);
let ma25=MA(base,25);

// =========================
// ボラティリティ
// =========================
let vol=0;
for(let i=1;i<base.length;i++){
 vol+=Math.abs(base[i]-base[i-1]);
}
vol/=base.length;

let risk=vol/base[base.length-1];

let riskText = risk<0.05?"低リスク":risk<0.15?"中リスク":"高リスク";

// =========================
// AI判断
// =========================
let advice="";

if(ma7.at(-1)>ma25.at(-1)){
 advice+="📈 上昇トレンド（買い有利）<br>";
}else{
 advice+="📉 下落トレンド（注意）<br>";
}

if(volume.at(-1)>volume[volume.length-10]){
 advice+="🔥 出来高増加 → 本物の動き<br>";
}

advice+=`⚠ リスク: ${riskText}`;

document.getElementById("aiAdvice").innerHTML=advice;

// =========================
// 描画
// =========================
datasets.push({label:"MA7",data:ma7,borderColor:"yellow"});
datasets.push({label:"MA25",data:ma25,borderColor:"red"});

datasets.push({
 type:"bar",
 label:"出来高",
 data:volume,
 backgroundColor:"rgba(255,255,0,0.2)"
});

if(historyChart) historyChart.destroy();

historyChart=new Chart(document.getElementById("historyChart"),{
 data:{labels,datasets}
});

}

</script>

</body>
</html>
