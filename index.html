<!DOCTYPE html>
<html>
<head>
<title>Albion AI Market Analyzer</title>
<style>
body{
background:#0a0a0a;
color:white;
font-family:sans-serif;
text-align:center;
}

input{
padding:10px;
font-size:18px;
}

button{
padding:10px;
font-size:18px;
margin-left:10px;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:10px;
}
</style>
</head>

<body>

<h1>Albion AI Market Analyzer</h1>

<input id="item" value="T4_BAG">
<button onclick="loadPrices()">Search</button>

<table id="table">
<tr>
<th>City</th>
<th>Sell</th>
<th>Buy</th>
</tr>
</table>

<script>

async function loadPrices(){

let item=document.getElementById("item").value;

let url="https://west.albion-online-data.com/api/v2/stats/prices/"+item+".json";

let res=await fetch(url);

let data=await res.json();

let table=document.getElementById("table");

table.innerHTML="<tr><th>City</th><th>Sell</th><th>Buy</th></tr>";

data.forEach(d=>{

table.innerHTML+=`
<tr>
<td>${d.city}</td>
<td>${d.sell_price_min}</td>
<td>${d.buy_price_max}</td>
</tr>
`;

});

}

</script>

</body>
</html>
